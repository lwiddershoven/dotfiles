# ~/.dotfiles/mise/.config/mise/config.toml

[tools]
node                = "24"
pnpm                = "10.33.2"
java                = "openjdk-25"
maven               = "3.9.14"
quarkus             = "3.33"
python              = "3.14"
"npm:ccstatusline"  = "2.2.19"
"npm:@fission-ai/openspec" = "latest"
"uv"                = "0.11.6"

opentofu            = "latest"
kubectl             = "latest"
helm                = "latest"

[settings]
trusted_config_paths  = [
  "~/.config/mise",
  "~/projects/",
]

idiomatic_version_file_enable_tools = [ "java", "node", "python" ]

[env]
MAVEN_OPTS="-Xmx512m"
